<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family: 'Blackrush';
            src: url('Blackrush.ttf') format('opentype'), url('Blackrush.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        /*
        Tipos de formato: 
        - opentype (otf)
        - truetype (ttf)
        - embedded opentype (eot)
        - truetype-att (Apple Addvanced Typography) (ttf)
        - svg
        */
        
        body {
            font-family: Arial, Helvetica, sans-serif
        }
        h1 {
            font-family: 'Blackrush', Georgia, 'Times New Roman', Times, serif;
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Olá Mundo!</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Impedit obcaecati asperiores voluptatem accusamus natus, debitis magni dolorem ad maxime suscipit recusandae veniam quas aut. Eius libero veniam eos suscipit inventore.</p>
</body>
</html>

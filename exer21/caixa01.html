<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de caixas</title>
    <style>
        h1 {
          background-color: rgb(161, 154, 225);

          height: 300px;  
          width: 300px;

          border: 10px solid rgb(28, 19, 160);

          padding: 10px;

          margin: 10px;

          outline: 10px dashed black;
        }
        
        a {
            border-width: 30px;
            border-style: solid;
            border-color: red;
        }
    </style>
        
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Paragrafos tammbém são exemplos de box-level, mas os # links são exemplos de caixas inline-level. Vamos ver como tudo isso funciona.</p>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafo</title>
</head>
<body>
    <h1>Parágrafos e quebras de linhas</h1>
    <hr>
    <p>Você pode escrever o paragráfo de qualquer jeito. Basta colocar tudo no meio do par de tags p e /p.</p>
    <p>Se precisar quebrar o texto em algum lugar especifico use a tag br. <br>.</p>
    <p>Vamos adicionar alguns símbulos</p>
    &reg; 
    &copy;
    &trade;
    &euro;
    &yen;
    &cent;
    &pound;
    &delta;
    &uarr;
    <p>Vamos adicionar alguns emojis
    &#x2705;
    &#x1F973;
    </p>
</body>
</html>

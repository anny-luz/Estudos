<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            
        }
        a {
            color: rgb(235, 13, 13);
            text-decoration: none;
            font-weight: bold;
        }
        a:visited {
            color: rgb(8, 251, 24);
        }
        a:hover {
            text-decoration: underline;
            color: black; 
        }
        a:active {
            color: rgb(219, 253, 29);
        }
        a::before {
            content: '🔗 ';
            text-decoration: none;
            font-weight: normal;
            color: rgb(72, 70, 70);
        }
        a::after {
            content: '[⋆.𐙚 ̊]';
            text-decoration: none;
            font-weight: normal;
            color: rgb(91, 87, 87);
            
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://www.linkedin.com/in/annyluz" target="_blank">LinkedIn</a></li>
        <li><a href="https://www.github.com/annyluz" target="_blank">Repositório do GitHub</a></li>
    </ul>
</body>
</html>
